<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar Sesión — Portal CFDI</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body{background:#1a5276;min-height:100vh;
         display:flex;align-items:center;justify-content:center;}
    .login-card{width:100%;max-width:420px;}
    .login-header{background:#1a5276;color:#fff;
                  border-radius:.5rem .5rem 0 0;padding:2rem;text-align:center;}
    .login-header h4{margin:0;font-weight:700;}
    .login-header p{margin:.3rem 0 0;opacity:.8;font-size:.88rem;}
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div style="font-size:2.5rem">📋</div>
    <h4>Portal de Gestión CFDI</h4>
    <p>DIF Municipal La Paz, BCS</p>
  </div>
  <div class="card-body bg-white p-4 rounded-bottom shadow">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Correo electrónico</label>
        <input type="email" name="email" class="form-control"
               placeholder="usuario@dif.gob.mx" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        Iniciar sesión
      </button>
    </form>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.8rem">
      ¿Olvidaste tu contraseña? Contacta al administrador del sistema.
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
