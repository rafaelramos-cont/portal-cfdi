{% extends 'base.html' %}
{% block title %}Nueva Solicitud de Compra{% endblock %}
{% block page_title %}<i class="bi bi-cart-plus me-1"></i> Nueva Solicitud de Compra{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header">Datos de la Solicitud</div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Área solicitante *</label>
              <select name="area" class="form-select" required>
                <option value="">— Selecciona —</option>
                {% for a in areas %}
                <option value="{{ a }}"
                  {% if current_user.area == a %}selected{% endif %}>
                  {{ a }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Monto estimado (MXN)</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="monto_estimado" class="form-control"
                       step="0.01" min="0" placeholder="0.00">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Descripción del bien / servicio *</label>
              <textarea name="descripcion" class="form-control" rows="3"
                        placeholder="Describe qué se necesita adquirir" required></textarea>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Justificación</label>
              <textarea name="justificacion" class="form-control" rows="2"
                        placeholder="¿Por qué se requiere esta compra?"></textarea>
            </div>

            <div class="col-md-8">
              <label class="form-label fw-semibold">Proveedor sugerido</label>
              <input type="text" name="proveedor_sugerido" class="form-control"
                     placeholder="Nombre o razón social del proveedor (opcional)">
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Cotización / Adjunto</label>
              <input type="file" name="archivo" class="form-control"
                     accept=".pdf,.jpg,.jpeg,.png">
              <div class="form-text">PDF o imagen, máx 10 MB</div>
            </div>
          </div>

          <hr class="my-4">
          <div class="d-flex gap-2 justify-content-end">
            <a href="{{ url_for('compras_index') }}"
               class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-warning fw-semibold">
              <i class="bi bi-send"></i> Enviar Solicitud
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
